<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>finnote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0E17; --surface: #111827; --grid: #1F2937; --border: #374151;
    --white: #F9FAFB; --fg: #E5E7EB; --text2: #9CA3AF; --text3: #6B7280;
    --green: #10B981; --red: #EF4444; --amber: #F59E0B; --blue: #3B82F6;
    --purple: #8B5CF6; --teal: #14B8A6;
    --sidebar-w: 280px;
    --topbar-h: 52px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--fg); font-family: Inter, sans-serif; overflow: hidden; height: 100vh; }

  /* ── Top Bar ─────────────────────────────── */
  .topbar {
    height: var(--topbar-h); background: var(--surface); border-bottom: 1px solid var(--grid);
    display: flex; align-items: center; padding: 0 20px; gap: 16px; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  }
  .logo { font-weight: 700; font-size: 18px; color: var(--white); letter-spacing: -0.5px; }
  .logo span { color: var(--blue); }
  .nav-tabs { display: flex; gap: 4px; margin-left: 24px; }
  .nav-tab {
    padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--text2);
    cursor: pointer; transition: all 0.15s; border: none; background: none;
  }
  .nav-tab:hover { color: var(--fg); background: var(--grid); }
  .nav-tab.active { color: var(--blue); background: rgba(59,130,246,0.15); border: 1px solid var(--blue); }
  .search-box {
    margin-left: auto; position: relative; width: 260px;
  }
  .search-box input {
    width: 100%; padding: 7px 12px 7px 32px; border-radius: 6px; border: 1px solid var(--grid);
    background: var(--bg); color: var(--fg); font-family: 'JetBrains Mono', monospace; font-size: 12px;
    outline: none; transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: var(--blue); }
  .search-box input::placeholder { color: var(--text3); }
  .search-box::before {
    content: '/'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
  }
  .hamburger { display: none; background: none; border: none; color: var(--fg); font-size: 20px; cursor: pointer; }

  /* ── Layout ──────────────────────────────── */
  .layout { display: flex; height: calc(100vh - var(--topbar-h)); margin-top: var(--topbar-h); }

  /* ── Sidebar ─────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface);
    border-right: 1px solid var(--grid); overflow-y: auto; padding: 12px 0;
    scrollbar-width: thin; scrollbar-color: var(--grid) transparent;
  }
  .sidebar-section { margin-bottom: 4px; }
  .sidebar-section-header {
    display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text2); transition: color 0.15s;
  }
  .sidebar-section-header:hover { color: var(--fg); }
  .sidebar-section-header .badge {
    margin-left: auto; background: var(--grid); color: var(--text2); padding: 1px 6px;
    border-radius: 10px; font-size: 10px; font-weight: 500;
  }
  .sidebar-section-header .arrow { font-size: 10px; transition: transform 0.15s; }
  .sidebar-section-header.open .arrow { transform: rotate(90deg); }
  .sidebar-subsection { display: none; }
  .sidebar-subsection.open { display: block; }
  .sidebar-subsection-label {
    padding: 5px 16px 5px 28px; font-size: 11px; font-weight: 500; color: var(--text3);
    cursor: pointer; display: flex; align-items: center; gap: 4px; user-select: none;
  }
  .sidebar-subsection-label:hover { color: var(--text2); }
  .sidebar-subsection-label .sub-arrow { font-size: 9px; transition: transform 0.15s; display: inline-block; }
  .sidebar-subsection-label.sub-open .sub-arrow { transform: rotate(90deg); }
  .sidebar-sub-items { display: none; }
  .sidebar-sub-items.sub-open { display: block; }
  .sidebar-item {
    display: block; padding: 5px 16px 5px 36px; font-size: 12px; color: var(--text2);
    cursor: pointer; text-decoration: none; transition: all 0.1s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid transparent;
  }
  .sidebar-item:hover { color: var(--fg); background: rgba(59,130,246,0.06); }
  .sidebar-item.active { color: var(--blue); background: rgba(59,130,246,0.1); border-left-color: var(--blue); }

  /* ── Main Content ────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .breadcrumb {
    padding: 10px 20px; font-size: 12px; color: var(--text3); border-bottom: 1px solid var(--grid);
    font-family: 'JetBrains Mono', monospace; min-height: 38px; display: flex; align-items: center; gap: 6px;
  }
  .breadcrumb span { color: var(--text2); }
  .breadcrumb .sep { color: var(--border); }
  .chart-description {
    padding: 6px 20px; font-size: 12px; color: var(--text2);
    border-bottom: 1px solid var(--grid); font-family: 'JetBrains Mono', monospace;
    min-height: 0;
  }
  .chart-description:empty { display: none; }
  .chart-frame {
    flex: 1; border: none; width: 100%; background: var(--bg);
  }
  .chart-placeholder {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    color: var(--text3);
  }
  .chart-placeholder .icon { font-size: 48px; opacity: 0.3; }
  .chart-placeholder p { font-size: 14px; }
  .chart-loading {
    flex: 1; display: none; align-items: center; justify-content: center; gap: 10px; color: var(--text3);
  }
  .chart-loading .spinner {
    width: 20px; height: 20px; border: 2px solid var(--grid); border-top-color: var(--blue);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer ──────────────────────────────── */
  .footer {
    padding: 8px 20px; font-size: 11px; color: var(--text3); border-top: 1px solid var(--grid);
    font-family: 'JetBrains Mono', monospace; display: flex; gap: 16px;
  }

  /* ── Search Results Dropdown ─────────────── */
  .search-results {
    position: absolute; top: 100%; left: 0; right: 0; background: var(--surface);
    border: 1px solid var(--grid); border-radius: 8px; margin-top: 4px; max-height: 320px;
    overflow-y: auto; display: none; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .search-results.visible { display: block; }
  .search-result-item {
    padding: 8px 14px; cursor: pointer; font-size: 12px; border-bottom: 1px solid var(--grid);
    transition: background 0.1s;
  }
  .search-result-item:hover { background: rgba(59,130,246,0.1); }
  .search-result-item .title { color: var(--fg); }
  .search-result-item .section { color: var(--text3); font-size: 11px; }

  /* ── Responsive ──────────────────────────── */
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: -300px; top: var(--topbar-h); bottom: 0; z-index: 90; transition: left 0.2s; }
    .sidebar.open { left: 0; }
    .hamburger { display: block; }
    .nav-tabs { display: none; }
    .search-box { width: 180px; }
  }

  /* ── Keyboard hint ───────────────────────── */
  .kbd { display: inline-block; padding: 1px 5px; background: var(--grid); border-radius: 3px;
         font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); }

  /* ── LIVE badges ─────────────────────────── */
  .live-badge {
      display: inline-block; background: var(--red); color: white; padding: 1px 6px;
      border-radius: 3px; font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }

  .sidebar-live-section {
      border-bottom: 1px solid var(--grid); padding-bottom: 8px; margin-bottom: 4px;
  }
  .sidebar-live-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 16px; font-size: 12px; color: var(--fg);
      cursor: pointer; text-decoration: none; transition: all 0.1s;
  }
  .sidebar-live-item:hover { background: rgba(239,68,68,0.08); }
</style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
  <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
  <a class="logo" href="#morning_brief" style="text-decoration:none;color:inherit;cursor:pointer">finn<span>ote</span></a>
  <nav class="nav-tabs" id="navTabs"></nav>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search charts...  /" autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
</header>

<!-- Layout -->
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="breadcrumb" id="breadcrumb">
      <span>finnote</span>
    </div>
    <div class="chart-description" id="chartDescription"></div>
    <iframe class="chart-frame" id="chartFrame" style="display:none"></iframe>
    <div class="chart-loading" id="chartLoading">
      <div class="spinner"></div> Loading chart...
    </div>
    <div class="chart-placeholder" id="chartPlaceholder">
      <div class="icon">&#9673;</div>
      <p>Select a chart from the sidebar</p>
      <p style="font-size:12px">Use <span class="kbd">/</span> to search &middot; <span class="kbd">&larr;</span><span class="kbd">&rarr;</span> to navigate</p>
    </div>
    <div class="footer" id="footer"></div>
  </div>
</div>

<script>
(function() {
  let manifest = null;
  let allCharts = [];       // flat list of {id, title, path, sectionId, subsectionId, tags}
  let currentIdx = -1;
  let activeSection = null;
  let loadTimeout = null;

  // ── Load manifest ────────────────────────────
  fetch('manifest.json')
    .then(r => r.json())
    .then(data => { manifest = data; init(); })
    .catch(() => {
      document.getElementById('chartPlaceholder').innerHTML =
        '<div class="icon">&#9888;</div><p>manifest.json not found</p>' +
        '<p style="font-size:12px">Run: python -m finnote.datastore.build_manifest</p>';
    });

  function init() {
    buildFlatList();
    buildNavTabs();
    buildSidebar();
    buildLiveCoverages();

    // Add Morning Brief link at the top of the sidebar
    if (manifest.morning_brief_path) {
      const sb = document.getElementById('sidebar');
      const mbLink = document.createElement('div');
      mbLink.style.cssText = 'padding:8px 16px;border-bottom:1px solid var(--grid);margin-bottom:4px;';
      const a = document.createElement('a');
      a.style.cssText = 'font-size:12px;font-weight:600;color:var(--blue);cursor:pointer;text-decoration:none;display:block;';
      a.textContent = '\u2302 Morning Brief';
      a.href = '#morning_brief';
      a.onclick = (e) => {
        e.preventDefault();
        location.hash = 'morning_brief';
      };
      mbLink.appendChild(a);
      sb.insertBefore(mbLink, sb.firstChild);
    }

    updateFooter();
    handleHash();
    window.addEventListener('hashchange', handleHash);
  }

  // ── Flatten all charts into searchable list ──
  function buildFlatList() {
    allCharts = [];
    for (const sec of manifest.sections) {
      if (sec.charts) {
        for (const c of sec.charts) {
          allCharts.push({...c, sectionId: sec.id, subsectionId: null, sectionLabel: sec.label});
        }
      }
      if (sec.subsections) {
        for (const sub of sec.subsections) {
          for (const c of sub.charts) {
            allCharts.push({...c, sectionId: sec.id, subsectionId: sub.id, sectionLabel: sec.label, subLabel: sub.label});
          }
        }
      }
    }
  }

  // ── Nav tabs ─────────────────────────────────
  function buildNavTabs() {
    const tabs = document.getElementById('navTabs');
    manifest.sections.forEach(sec => {
      const btn = document.createElement('button');
      btn.className = 'nav-tab';
      btn.textContent = sec.label.replace(/\s*\(.*?\)/, '');
      btn.dataset.section = sec.id;
      btn.onclick = () => scrollToSection(sec.id);
      tabs.appendChild(btn);
    });
  }

  function scrollToSection(sectionId) {
    const sb = document.getElementById('sidebar');
    // Close all sections first (accordion behavior)
    sb.querySelectorAll('.sidebar-section-header.open').forEach(h => {
      h.classList.remove('open');
      h.nextElementSibling?.classList.remove('open');
    });
    const el = document.querySelector(`[data-section-id="${sectionId}"]`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // Open the target section
      el.classList.add('open');
      el.nextElementSibling?.classList.add('open');
    }
    // Activate tab
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.section === sectionId));
    activeSection = sectionId;
  }

  // ── Live Coverages ───────────────────────────
  function buildLiveCoverages() {
    const coverages = manifest.live_coverages || [];
    if (coverages.length === 0) return;

    const sb = document.getElementById('sidebar');
    const liveDiv = document.createElement('div');
    liveDiv.className = 'sidebar-live-section';

    const hdr = document.createElement('div');
    hdr.style.cssText = 'padding:8px 16px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;';
    hdr.textContent = 'Live Coverage';
    liveDiv.appendChild(hdr);

    coverages.forEach(cov => {
        const a = document.createElement('a');
        a.className = 'sidebar-live-item';
        a.innerHTML = `<span class="live-badge">LIVE</span> ${cov.title}`;
        a.href = '#';
        a.onclick = (e) => {
            e.preventDefault();
            currentIdx = -1;
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            const frame = document.getElementById('chartFrame');
            document.getElementById('chartPlaceholder').style.display = 'none';
            document.getElementById('chartLoading').style.display = 'flex';
            document.getElementById('chartLoading').innerHTML = '<div class="spinner"></div> Loading chart...';
            frame.style.display = 'none';
            const liveTimeout = setTimeout(() => {
              document.getElementById('chartLoading').innerHTML =
                '<div class="spinner"></div> Still loading... chart may be unavailable';
            }, 5000);
            frame.onload = () => {
                clearTimeout(liveTimeout);
                document.getElementById('chartLoading').style.display = 'none';
                frame.style.display = 'block';
            };
            frame.onerror = () => {
                clearTimeout(liveTimeout);
                document.getElementById('chartLoading').style.display = 'none';
                const ph = document.getElementById('chartPlaceholder');
                ph.style.display = 'flex';
                ph.innerHTML = '<div class="icon" style="color:var(--red)">&#9888;</div>' +
                  '<p>Live coverage failed to load</p>';
            };
            frame.src = cov.timeline_path;
            document.getElementById('breadcrumb').innerHTML =
                '<span>finnote</span> <span class="sep">/</span> <span class="live-badge">LIVE</span> <span style="color:var(--white)">' + cov.title + '</span>';
            document.getElementById('chartDescription').textContent = 'Persistent multi-day story with chronological updates';
            updateFooter();
        };
        liveDiv.appendChild(a);
    });

    sb.insertBefore(liveDiv, sb.firstChild);
  }

  // ── Sidebar ──────────────────────────────────
  function buildSidebar() {
    const sb = document.getElementById('sidebar');
    sb.innerHTML = '';
    for (const sec of manifest.sections) {
      const sDiv = document.createElement('div');
      sDiv.className = 'sidebar-section';

      // Section header
      const hdr = document.createElement('div');
      hdr.className = 'sidebar-section-header';
      hdr.dataset.sectionId = sec.id;
      const count = (sec.charts?.length || 0) + (sec.subsections || []).reduce((a, s) => a + s.charts.length, 0);
      hdr.innerHTML = `<span class="arrow">&#9656;</span> ${sec.label} <span class="badge">${count}</span>`;
      hdr.onclick = () => {
        const wasOpen = hdr.classList.contains('open');
        // Close all child subsection open states before collapsing
        sb.querySelectorAll('.sidebar-section-header.open').forEach(h => {
          const sectionContent = h.nextElementSibling;
          if (sectionContent) {
            sectionContent.querySelectorAll('.sidebar-subsection-label.sub-open').forEach(sl => {
              sl.classList.remove('sub-open');
            });
            sectionContent.querySelectorAll('.sidebar-sub-items.sub-open').forEach(si => {
              si.classList.remove('sub-open');
            });
          }
          h.classList.remove('open');
          sectionContent?.classList.remove('open');
        });
        if (!wasOpen) {
          hdr.classList.add('open');
          hdr.nextElementSibling?.classList.add('open');
        }
      };
      sDiv.appendChild(hdr);

      // Content
      const content = document.createElement('div');
      content.className = 'sidebar-subsection';

      if (sec.charts) {
        sec.charts.forEach(c => {
          content.appendChild(makeItem(c, sec.id, null));
        });
      }
      if (sec.subsections) {
        sec.subsections.forEach((sub, idx) => {
          const subLabel = document.createElement('div');
          subLabel.className = 'sidebar-subsection-label';
          const latestTag = idx === 0 ? ' <span style="color:var(--green);font-size:9px;font-weight:600;margin-left:4px">LATEST</span>' : '';
          subLabel.innerHTML = `<span class="sub-arrow">&#9656;</span> ${sub.label} <span class="badge">${sub.charts.length}</span>${latestTag}`;
          const subItems = document.createElement('div');
          subItems.className = 'sidebar-sub-items';
          subLabel.onclick = () => {
            const wasOpen = subLabel.classList.contains('sub-open');
            // Accordion: close sibling subsections
            content.querySelectorAll('.sidebar-subsection-label.sub-open').forEach(sl => {
              sl.classList.remove('sub-open');
              sl.nextElementSibling?.classList.remove('sub-open');
            });
            if (!wasOpen) {
              subLabel.classList.add('sub-open');
              subItems.classList.add('sub-open');
            }
          };
          content.appendChild(subLabel);
          sub.charts.forEach(c => {
            subItems.appendChild(makeItem(c, sec.id, sub.id));
          });
          content.appendChild(subItems);
        });
      }
      sDiv.appendChild(content);
      sb.appendChild(sDiv);
    }

    // Don't auto-open any section — let handleHash() → loadChart() → expandToChart() handle it
  }

  function makeItem(chart, sectionId, subsectionId) {
    const a = document.createElement('a');
    a.className = 'sidebar-item';
    a.textContent = chart.title;
    a.href = `#${sectionId}/${subsectionId ? subsectionId + '/' : ''}${chart.id}`;
    a.dataset.chartId = chart.id;
    if (chart.description) a.title = chart.description;
    return a;
  }

  // ── Expand sidebar to show a chart ───────────
  function expandToChart(sectionId, subsectionId) {
    const sb = document.getElementById('sidebar');
    // Close all sections first
    sb.querySelectorAll('.sidebar-section-header.open').forEach(h => {
      h.classList.remove('open');
      h.nextElementSibling?.classList.remove('open');
    });
    // Open the correct section
    const hdr = sb.querySelector(`.sidebar-section-header[data-section-id="${sectionId}"]`);
    if (hdr) {
      hdr.classList.add('open');
      const content = hdr.nextElementSibling;
      if (content) {
        content.classList.add('open');
        // Close all subsections first
        content.querySelectorAll('.sidebar-subsection-label.sub-open').forEach(sl => {
          sl.classList.remove('sub-open');
          sl.nextElementSibling?.classList.remove('sub-open');
        });
        // Open the correct subsection if needed
        if (subsectionId) {
          const subLabels = content.querySelectorAll('.sidebar-subsection-label');
          subLabels.forEach(sl => {
            const subItems = sl.nextElementSibling;
            if (subItems && subItems.querySelector(`[data-chart-id]`)?.closest('.sidebar-sub-items')) {
              // Check if this subsection contains a chart belonging to the right subsectionId
              const link = subItems.querySelector(`a[href*="/${subsectionId}/"]`);
              if (link) {
                sl.classList.add('sub-open');
                subItems.classList.add('sub-open');
              }
            }
          });
        }
      }
    }
    // Scroll active item into view
    setTimeout(() => {
      const activeItem = sb.querySelector('.sidebar-item.active');
      if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }

  // ── Load chart ───────────────────────────────
  function loadChart(sectionId, subsectionId, chartId) {
    const chart = allCharts.find(c =>
      c.sectionId === sectionId &&
      (subsectionId ? c.subsectionId === subsectionId : true) &&
      c.id === chartId
    );
    if (!chart) return;

    currentIdx = allCharts.indexOf(chart);

    // Update breadcrumb
    const bc = document.getElementById('breadcrumb');
    let parts = [`<span>finnote</span>`, `<span class="sep">/</span>`, `<span>${chart.sectionLabel}</span>`];
    if (chart.subLabel) parts.push(`<span class="sep">/</span>`, `<span>${chart.subLabel}</span>`);
    parts.push(`<span class="sep">/</span>`, `<span style="color:var(--white)">${chart.title}</span>`);
    bc.innerHTML = parts.join(' ');

    // Update description bar
    document.getElementById('chartDescription').textContent = chart.description || '';

    // Show loading
    clearTimeout(loadTimeout);
    document.getElementById('chartLoading').innerHTML = '<div class="spinner"></div> Loading chart...';
    document.getElementById('chartPlaceholder').style.display = 'none';
    document.getElementById('chartLoading').style.display = 'flex';
    document.getElementById('chartFrame').style.display = 'none';

    const frame = document.getElementById('chartFrame');
    loadTimeout = setTimeout(() => {
      document.getElementById('chartLoading').innerHTML =
        '<div class="spinner"></div> Still loading... chart may be unavailable';
    }, 5000);
    frame.onload = () => {
      clearTimeout(loadTimeout);
      document.getElementById('chartLoading').style.display = 'none';
      document.getElementById('chartLoading').innerHTML = '<div class="spinner"></div> Loading chart...';
      frame.style.display = 'block';
    };
    frame.onerror = () => {
      clearTimeout(loadTimeout);
      document.getElementById('chartLoading').style.display = 'none';
      const ph = document.getElementById('chartPlaceholder');
      ph.style.display = 'flex';
      ph.innerHTML = '<div class="icon" style="color:var(--red)">&#9888;</div>' +
        '<p>Chart failed to load</p>' +
        `<p style="font-size:12px;color:var(--text3)">Expected: ${chart.path}</p>`;
    };
    frame.src = chart.path;

    // Highlight sidebar item
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.toggle('active', i.dataset.chartId === chartId));

    // Activate tab
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.section === sectionId));

    // Close mobile sidebar
    document.getElementById('sidebar').classList.remove('open');

    // Auto-expand sidebar to show active chart
    expandToChart(sectionId, subsectionId);

    // Update footer with chart position
    updateFooter();
  }

  // ── Hash routing ─────────────────────────────
  function handleHash() {
    const hash = location.hash.slice(1);
    if (!hash) {
      // Morning Brief is the default landing page
      if (manifest.morning_brief_path) {
        currentIdx = -1;
        const frame = document.getElementById('chartFrame');
        document.getElementById('chartPlaceholder').style.display = 'none';
        document.getElementById('chartLoading').style.display = 'flex';
        document.getElementById('chartLoading').innerHTML = '<div class="spinner"></div> Loading chart...';
        frame.style.display = 'none';
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        const liveLoadTimeout = setTimeout(() => {
          document.getElementById('chartLoading').innerHTML =
            '<div class="spinner"></div> Still loading... chart may be unavailable';
        }, 5000);
        frame.onload = () => {
            clearTimeout(liveLoadTimeout);
            document.getElementById('chartLoading').style.display = 'none';
            frame.style.display = 'block';
        };
        frame.onerror = () => {
            clearTimeout(liveLoadTimeout);
            document.getElementById('chartLoading').style.display = 'none';
            const ph = document.getElementById('chartPlaceholder');
            ph.style.display = 'flex';
            ph.innerHTML = '<div class="icon" style="color:var(--red)">&#9888;</div>' +
              '<p>Morning Brief failed to load</p>';
        };
        frame.src = manifest.morning_brief_path;
        document.getElementById('breadcrumb').innerHTML =
            '<span>finnote</span> <span class="sep">/</span> <span style="color:var(--white)">Morning Brief</span>';
        document.getElementById('chartDescription').textContent = 'Daily intelligence dashboard — news, data, and signals in one page';
        updateFooter();
        return;
      }
      // Fallback to chart
      const c = allCharts.find(c => c.id === '00_scoreboard' && c.sectionId === 'daily')
             || allCharts.find(c => c.id === 'global_equity_heatmap')
             || allCharts[0];
      if (c) {
        location.hash = `${c.sectionId}/${c.subsectionId ? c.subsectionId + '/' : ''}${c.id}`;
      }
      return;
    }
    const parts = hash.split('/');
    if (parts.length === 1 && parts[0] === 'morning_brief') {
      // Handle #morning_brief hash — load morning brief iframe
      if (manifest.morning_brief_path) {
        currentIdx = -1;
        const frame = document.getElementById('chartFrame');
        document.getElementById('chartPlaceholder').style.display = 'none';
        document.getElementById('chartLoading').style.display = 'flex';
        document.getElementById('chartLoading').innerHTML = '<div class="spinner"></div> Loading chart...';
        frame.style.display = 'none';
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        const mbTimeout = setTimeout(() => {
          document.getElementById('chartLoading').innerHTML =
            '<div class="spinner"></div> Still loading... chart may be unavailable';
        }, 5000);
        frame.onload = () => {
            clearTimeout(mbTimeout);
            document.getElementById('chartLoading').style.display = 'none';
            frame.style.display = 'block';
        };
        frame.onerror = () => {
            clearTimeout(mbTimeout);
            document.getElementById('chartLoading').style.display = 'none';
            const ph = document.getElementById('chartPlaceholder');
            ph.style.display = 'flex';
            ph.innerHTML = '<div class="icon" style="color:var(--red)">&#9888;</div>' +
              '<p>Morning Brief failed to load</p>';
        };
        frame.src = manifest.morning_brief_path;
        document.getElementById('breadcrumb').innerHTML =
            '<span>finnote</span> <span class="sep">/</span> <span style="color:var(--white)">Morning Brief</span>';
        document.getElementById('chartDescription').textContent = 'Daily intelligence dashboard — news, data, and signals in one page';
        updateFooter();
      }
    }
    else if (parts.length === 2) loadChart(parts[0], null, parts[1]);
    else if (parts.length === 3) loadChart(parts[0], parts[1], parts[2]);
  }

  // ── Search ───────────────────────────────────
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    if (q.length < 2) { searchResults.classList.remove('visible'); return; }

    const matches = allCharts.filter(c =>
      c.title.toLowerCase().includes(q) ||
      (c.description || '').toLowerCase().includes(q) ||
      (c.tags || []).some(t => t.includes(q)) ||
      c.id.toLowerCase().includes(q)
    ).slice(0, 10);

    if (matches.length === 0) { searchResults.classList.remove('visible'); return; }

    searchResults.innerHTML = matches.map(c =>
      `<div class="search-result-item" data-hash="${c.sectionId}/${c.subsectionId ? c.subsectionId + '/' : ''}${c.id}">
        <div class="title">${c.title}</div>
        <div class="section">${c.sectionLabel}${c.subLabel ? ' > ' + c.subLabel : ''}</div>
        ${c.description ? `<div style="color:var(--text3);font-size:11px;margin-top:2px">${c.description}</div>` : ''}
      </div>`
    ).join('');
    searchResults.classList.add('visible');

    searchResults.querySelectorAll('.search-result-item').forEach(el => {
      el.onclick = () => {
        location.hash = el.dataset.hash;
        searchInput.value = '';
        searchResults.classList.remove('visible');
      };
    });
  });

  searchInput.addEventListener('blur', () => setTimeout(() => searchResults.classList.remove('visible'), 200));

  // ── Keyboard shortcuts ───────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); return; }
    if (document.activeElement === searchInput) { if (e.key === 'Escape') searchInput.blur(); return; }

    if (e.key === 'ArrowRight' && currentIdx < allCharts.length - 1) {
      const next = allCharts[currentIdx + 1];
      location.hash = `${next.sectionId}/${next.subsectionId ? next.subsectionId + '/' : ''}${next.id}`;
    }
    if (e.key === 'ArrowLeft' && currentIdx > 0) {
      const prev = allCharts[currentIdx - 1];
      location.hash = `${prev.sectionId}/${prev.subsectionId ? prev.subsectionId + '/' : ''}${prev.id}`;
    }
  });

  // ── Footer ───────────────────────────────────
  function updateFooter() {
    const f = document.getElementById('footer');
    const db = manifest.db_summary || {};
    const pos = currentIdx >= 0 ? ` &middot; Chart ${currentIdx + 1} of ${allCharts.length}` : '';
    f.innerHTML = `finnote &middot; ${manifest.total_charts} charts &middot; ` +
      `${db.series || '?'} series &middot; ${(db.observations || 0).toLocaleString()} observations &middot; ` +
      `Updated ${manifest.generated?.slice(0, 16).replace('T', ' ') || '?'}${pos}`;
  }

  // ── Mobile sidebar toggle ────────────────────
  window.toggleSidebar = function() {
    document.getElementById('sidebar').classList.toggle('open');
  };
})();
</script>
</body>
</html>
